name: Plugin Release

on:
  workflow_run:
    workflows: ["Plugin CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_DIR: "plugin"
  DLL_NAME: "VATGER-Plugin.dll"

jobs:
  release:
    runs-on: windows-2025
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -S ${{ env.PROJECT_DIR }} -B build -A Win32

      - name: Build
        run: cmake --build build --parallel --config Release

      - name: CMake Project Version
        id: cmake-version
        uses: DarwinInnovation/cmake-project-version-action@v1.0
        with:
          path: ${{ env.PROJECT_DIR }}

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ steps.cmake-version.outputs.version }}
          release_name: v${{ steps.cmake-version.outputs.version }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{env.PROJECT_DIR}}/build/${{env.DLL_NAME}}
          asset_name: ${{env.DLL_NAME}}
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
